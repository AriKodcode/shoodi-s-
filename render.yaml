services:
  - type: web
    name: dal-service
    runtime: docker
    dockerContext: ./dal_service
    dockerfilePath: ./dal_service/Dockerfile
    plan: free
    envVars:
      - key: DAL_ROUTE
        value: candidates

  - type: web
    name: analyze-service
    runtime: docker
    dockerContext: ./data-analyze
    dockerfilePath: ./data-analyze/Dockerfile
    plan: free
    envVars:
      - key: DAL_HOST
        value: https://dal-service.onrender.com
      - key: DAL_ROUTE
        value: candidates

  - type: web
    name: backend
    runtime: docker
    dockerContext: ./server
    dockerfilePath: ./server/Dockerfile
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: ANALYZE_HOST
        value: https://analyze-service.onrender.com
      - key: ANALYZE_ROUTE
        value: analyze_client_choice

  - type: web
    name: frontend
    runtime: docker
    dockerContext: ./client
    dockerfilePath: ./client/Dockerfile
    plan: free
    envVars:
      - key: VITE_BACKEND_HOST
        value: https://backend.onrender.com
      - key: VITE_BACKEND_ROUTE
        value: meals