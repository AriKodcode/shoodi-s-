version: "3.9"

services:
  cache-service:
    build: ./cache-service
    container_name: cache
    ports:
      - "8002:8002"
    env_file:
      - .env
  dal-service:
    build: ./dal_service
    container_name: dal-service
    env_file:
      - .env
    ports:
      
      - "8000:8000"
  backend:
    build: ./server
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
  frontend:
    build:
      context: ./client
      args:
        # כאן אנחנו מושכים את הערכים מה-.env ומעבירים אותם ל-Dockerfile
        - VITE_BACKEND_HOST=${VITE_BACKEND_HOST}
        - VITE_BACKEND_PORT=${VITE_BACKEND_PORT}
        - VITE_BACKEND_ROUTE=${VITE_BACKEND_ROUTE}
    container_name: frontend
    env_file:
      - .env
    depends_on:
      dal-service:
        condition: service_started

    ports:
      - "3001:80"

